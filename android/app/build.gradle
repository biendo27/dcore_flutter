plugins {
    id "com.android.application"
    // START: FlutterFire Configuration
    id 'com.google.gms.google-services'
    // END: FlutterFire Configuration
    id "kotlin-android"
    // The Flutter Gradle Plugin must be applied after the Android and Kotlin Gradle plugins.
    id "dev.flutter.flutter-gradle-plugin"
}

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {

    // ----- BEGIN flavorDimensions (autogenerated by flutter_flavorizr) -----
    flavorDimensions += "flavor-type"

    productFlavors {
        dev {
            dimension "flavor-type"
            applicationId "flutter.base.dcore.dev"
            resValue "string", "app_name", "DCore Dev"
            resValue "string", "environment", "development"
            buildConfigField "String", "APP_ENVIRONMENT", "\"dev\""
            buildConfigField "String", "API_BASE_URL", "\"https://dev.venusshop.top/api/v1\""
            buildConfigField "boolean", "IS_DEBUG", "true"
        }
        stg {
            dimension "flavor-type"
            applicationId "flutter.base.dcore.stg"
            resValue "string", "app_name", "DCore Staging"
            resValue "string", "environment", "staging"
            buildConfigField "String", "APP_ENVIRONMENT", "\"stg\""
            buildConfigField "String", "API_BASE_URL", "\"https://dev.venusshop.top/api/v1\""
            buildConfigField "boolean", "IS_DEBUG", "true"
        }
        prod {
            dimension "flavor-type"
            applicationId "flutter.base.dcore"
            resValue "string", "app_name", "DCore"
            resValue "string", "environment", "production"
            buildConfigField "String", "APP_ENVIRONMENT", "\"prod\""
            buildConfigField "String", "API_BASE_URL", "\"https://venusshop.top/api/v1\""
            buildConfigField "boolean", "IS_DEBUG", "false"
        }
    }

    // ----- END flavorDimensions (autogenerated by flutter_flavorizr) -----

    
          
          
    namespace = "flutter.base.dcore"
    compileSdk = flutter.compileSdkVersion
    ndkVersion = "27.0.12077973"
    // ndkVersion = flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = JavaVersion.VERSION_11
    }

    defaultConfig {
        // TODO: Specify your own unique Application ID (https://developer.android.com/studio/build/application-id.html).
        applicationId "flutter.base.dcore"
        // You can update the following values to match your application needs.
        // For more information, see: https://flutter.dev/to/review-gradle-config.
        minSdk = 23
        minSdkVersion = 24
        targetSdk = flutter.targetSdkVersion
        versionCode = flutter.versionCode
        versionName = flutter.versionName
    }

    signingConfigs {
        release {
            keyAlias = keystoreProperties['keyAlias']
            keyPassword = keystoreProperties['keyPassword']
            storeFile = keystoreProperties['storeFile'] ? file(keystoreProperties['storeFile']) : null
            storePassword = keystoreProperties['storePassword']
        }
    }

    buildTypes {
        release {
            // TODO: Add your own signing config for the release build.
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig = signingConfigs.release
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

flutter {
    source = "../.."
}

afterEvaluate {
    def devTask = tasks.findByName('compileFlutterBuildDevRelease')
    def prodTask = tasks.findByName('compileFlutterBuildProdRelease')
    
    if (devTask != null && prodTask != null) {
        // For instance, declare that the Dev build must run after the Prod build:
        devTask.dependsOn(prodTask)
        // Alternatively, if your project requires the reverse, uncomment the next line:
        // prodTask.dependsOn(devTask)
    }
}